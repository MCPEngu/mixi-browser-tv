name: Android Build

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest

    env:
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle-user-home

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-31" "build-tools;34.0.0"

      - name: Build system debug APK
        run: ./gradlew --no-daemon --max-workers=2 assembleSystemDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mixi-browser-tv-system-debug-apk
          path: app/build/outputs/apk/system/debug/*.apk
